<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bear Intake Contract</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <!-- Auto-generated sketch image list. Re-run: node generate-manifest.js -->
    <script src="sketches-data.js"></script>

    <style>
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 15px;
            background: white;
            color: #333;
            cursor: pointer;
            appearance: auto;
        }
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.2);
        }
        .sketch-section {
            margin-top: 12px;
            padding: 14px;
            background: #f3f6ff;
            border: 1px solid #c5d0f5;
            border-radius: 8px;
        }
        .sketch-section h4 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .sketch-preview {
            display: none;
            margin-top: 10px;
            text-align: center;
        }
        .sketch-preview img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 6px;
            border: 2px solid #667eea;
            object-fit: contain;
        }
        .sketch-preview p {
            margin: 6px 0 0 0;
            font-size: 13px;
            color: #555;
        }
        .custom-entry-block {
            border: 2px dashed #5cb85c;
            background: #f9fff9;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .custom-entry-block .entry-title { color: #3a7a3a; }
        .custom-price-badge {
            display: inline-block;
            background: #5cb85c;
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
            font-weight: bold;
            vertical-align: middle;
        }
        .add-custom-btn {
            background: #5cb85c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            margin-left: 10px;
            transition: background 0.2s;
        }
        .add-custom-btn:hover { background: #4cae4c; }
        .custom-price-input {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #5cb85c;
            border-radius: 4px;
            background: #e8f5e9;
            color: #2e7d2e;
            box-sizing: border-box;
        }
        .custom-price-input:focus { outline: none; border-color: #3a7a3a; }
    </style>
</head>

<body>
<div id="statusMessage"></div>
<form id="contractForm">
<div class="container">
    <img
        src="https://images.leadconnectorhq.com/image/f_webp/q_85/r_1000/u_https://storage.googleapis.com/highlevel-backend.appspot.com/location/xzNra69OGYHaxmdDlDMn/form/eDvPanXWhbtHSvXrKdqz/b7d8cff1-2f99-4651-9dd9-f269926c08bb.webp"
        alt="Company Logo"
        class="form-logo"
    />
    <h1>Bear Intake Contract</h1>
    <p>Please complete all applicable fields below.</p>

    <h2>Client Information</h2>
    <div class="field-group"><label>Sold To</label><input type="text" name="soldTo"></div>
    <div class="field-group"><label>Phone Number</label><input type="tel" name="phone"></div>
    <div class="field-group"><label>Email</label><input type="email" name="email"></div>
    <div class="field-group"><label>Job Site</label><input type="text" name="jobSite"></div>

    <h2>Service Details</h2>
    <div class="field-group"><label>Type of Service</label><input type="text" name="serviceType"></div>
    <div class="field-group"><label>Preferred Date</label><input type="date" name="preferredDate"></div>

    <h2>Add Items</h2>
    <div id="entries-container"></div>

    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px;">
        <button type="button" class="add-btn" onclick="addEntry()">➕ Add Item</button>
        <button type="button" class="add-custom-btn" onclick="addCustomEntry()">✏️ Add Custom Item</button>
    </div>

    <div style="margin-top: 30px; padding: 20px; background: #f0f0f0; border-radius: 8px;">
        <h3 style="margin-top: 0;">Order Summary</h3>
        <div style="display: flex; justify-content: space-between; margin: 10px 0;">
            <strong>Subtotal:</strong><span id="subtotalDisplay">$0.00</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin: 10px 0;">
            <strong>Tax (10.25%):</strong><span id="taxDisplay">$0.00</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin: 10px 0; font-size: 20px; border-top: 2px solid #333; padding-top: 10px;">
            <strong>Total:</strong><strong id="totalDisplay">$0.00</strong>
        </div>
    </div>

    <button type="submit">Submit Contract</button>
</div>
</form>

<script>
// ─── Sketch manifest (base64 images pre-embedded by generate-manifest.js) ─────
const sketchManifest = window.SKETCH_MANIFEST || {};
if (!window.SKETCH_MANIFEST) {
    console.warn('sketches-data.js not found. Run: node generate-manifest.js');
}

// ─── Sketch picker builder ────────────────────────────────────────────────────
function buildSketchPicker(categoryKey, entryId, pickerIndex) {
    const images    = sketchManifest[categoryKey] || [];
    const selectId  = `sketch_${pickerIndex}_${entryId}`;
    const previewId = `sketchPreview_${pickerIndex}_${entryId}`;
    const imgId     = `sketchImg_${pickerIndex}_${entryId}`;
    const labelId   = `sketchLabel_${pickerIndex}_${entryId}`;

    let options = `<option value="">-- Select a sketch --</option>`;
    images.forEach(img => {
        options += `<option value="${img.file}">${img.name}</option>`;
    });

    return `
        <div class="sketch-section">
            <h4>📐 ${categoryKey} Sketch</h4>
            <select id="${selectId}" name="sketch_${pickerIndex}_${entryId}"
                    onchange="previewSketch('${selectId}','${previewId}','${imgId}','${labelId}','${categoryKey}')">
                ${options}
            </select>
            <div class="sketch-preview" id="${previewId}">
                <img id="${imgId}" src="" alt="Sketch preview">
                <p id="${labelId}"></p>
            </div>
        </div>`;
}

// Show preview using base64 data already in the manifest
function previewSketch(selectId, previewId, imgId, labelId, categoryKey) {
    const sel     = document.getElementById(selectId);
    const preview = document.getElementById(previewId);
    const imgEl   = document.getElementById(imgId);
    const labelEl = document.getElementById(labelId);

    if (sel && sel.value) {
        const match = (sketchManifest[categoryKey] || []).find(i => i.file === sel.value);
        if (match) {
            imgEl.src             = match.base64;
            labelEl.textContent   = match.name;
            preview.style.display = 'block';
        }
    } else if (preview) {
        preview.style.display = 'none';
    }
}

// Read the currently selected sketch file values from a block
// Returns { exteriorFile, patioFile } — empty string if nothing selected
function readSketchSelections(block) {
    const result = { exteriorFile: '', patioFile: '' };
    block.querySelectorAll("select[id^='sketch_']").forEach(sel => {
        const pIdx = sel.id.split('_')[1];
        if (pIdx === '1') result.exteriorFile = sel.value;
        if (pIdx === '2') result.patioFile    = sel.value;
    });
    return result;
}

// Apply previously-selected sketch values to a freshly-built block and show previews
function applySketchSelections(newId, exteriorFile, patioFile) {
    const categories = [
        { pIdx: '1', file: exteriorFile, category: 'Exterior Windows' },
        { pIdx: '2', file: patioFile,    category: 'Patio'            },
    ];
    categories.forEach(({ pIdx, file, category }) => {
        if (!file) return;
        const selectId  = `sketch_${pIdx}_${newId}`;
        const previewId = `sketchPreview_${pIdx}_${newId}`;
        const imgId     = `sketchImg_${pIdx}_${newId}`;
        const labelId   = `sketchLabel_${pIdx}_${newId}`;
        const sel = document.getElementById(selectId);
        if (sel) {
            sel.value = file;
            previewSketch(selectId, previewId, imgId, labelId, category);
        }
    });
}

// ─── Pricing ──────────────────────────────────────────────────────────────────
let entryCount = 0;

function calculatePrice(entryId) {
    const width  = parseFloat(document.querySelector(`input[name='width_${entryId}']`).value)  || 0;
    const height = parseFloat(document.querySelector(`input[name='height_${entryId}']`).value) || 0;
    const factor = parseFloat(document.querySelector(`input[name='factor_${entryId}']`).value) || 0;
    document.querySelector(`#price_${entryId}`).textContent = `$${((width + height) * factor).toFixed(2)}`;
    updateTotals();
}

function updateCustomPrice(entryId) {
    const price = parseFloat(document.querySelector(`input[name='customPrice_${entryId}']`).value) || 0;
    document.querySelector(`#price_${entryId}`).textContent = `$${price.toFixed(2)}`;
    updateTotals();
}

function updateTotals() {
    let subtotal = 0;
    document.querySelectorAll('[id^="price_"]').forEach(el => {
        subtotal += parseFloat(el.textContent.replace('$', '')) || 0;
    });
    const tax   = subtotal * 0.1025;
    const total = subtotal + tax;
    document.getElementById('subtotalDisplay').textContent = `$${subtotal.toFixed(2)}`;
    document.getElementById('taxDisplay').textContent      = `$${tax.toFixed(2)}`;
    document.getElementById('totalDisplay').textContent    = `$${total.toFixed(2)}`;
}

// ─── Build entry HTML ─────────────────────────────────────────────────────────
function buildEntryHTML(id, values = {}) {
    const v = values;
    return `
        <div class="entry-title">Entry ${id}</div>
        <div class="field-group"><label>Qty *</label>
            <input type="number" name="qty_${id}" value="${v.qty||''}">
        </div>
        <div class="field-group"><label>Width *</label>
            <input type="text" name="width_${id}" oninput="calculatePrice(${id})" value="${v.width||''}">
        </div>
        <div class="field-group"><label>Height *</label>
            <input type="text" name="height_${id}" oninput="calculatePrice(${id})" value="${v.height||''}">
        </div>
        <div class="field-group"><label>Multiplying factor *</label>
            <input type="text" name="factor_${id}" oninput="calculatePrice(${id})" value="${v.factor||''}">
        </div>
        <div class="field-group">
            <label>Frame *</label>
            <select name="frame_${id}">
                <option value="">-- Select Frame --</option>
                <option value="Retro-fit"       ${v.frame==='Retro-fit'       ?'selected':''}>Retro-fit</option>
                <option value="Block frame"     ${v.frame==='Block frame'     ?'selected':''}>Block frame</option>
                <option value="Nail-on"         ${v.frame==='Nail-on'         ?'selected':''}>Nail-on</option>
                <option value="Retroluxfin 2.5" ${v.frame==='Retroluxfin 2.5' ?'selected':''}>Retroluxfin 2.5</option>
            </select>
        </div>
        <div class="field-group">
            <label>Glass Type *</label>
            <select name="glassType_${id}">
                <option value="">-- Select Glass Type --</option>
                <option value="Title 24 package dual pane"             ${v.glassType==='Title 24 package dual pane'             ?'selected':''}>Title 24 package dual pane</option>
                <option value="Title 24 package width tempered"        ${v.glassType==='Title 24 package width tempered'        ?'selected':''}>Title 24 package width tempered</option>
                <option value="Title 24 package fire zone compliant"   ${v.glassType==='Title 24 package fire zone compliant'   ?'selected':''}>Title 24 package fire zone compliant</option>
                <option value="Title 24 package width fire zone glass" ${v.glassType==='Title 24 package width fire zone glass' ?'selected':''}>Title 24 package width fire zone glass</option>
                <option value="Title 24 package width obscured"        ${v.glassType==='Title 24 package width obscured'        ?'selected':''}>Title 24 package width obscured</option>
                <option value="Title 24 package width laminate"        ${v.glassType==='Title 24 package width laminate'        ?'selected':''}>Title 24 package width laminate</option>
                <option value="Title 24 package high security glass"   ${v.glassType==='Title 24 package high security glass'   ?'selected':''}>Title 24 package high security glass</option>
                <option value="Title 24 package width triple pane"     ${v.glassType==='Title 24 package width triple pane'     ?'selected':''}>Title 24 package triple pane</option>
            </select>
        </div>
        <div class="field-group"><label>Glass Make-up *</label>
            <input type="text" name="glassMakeup_${id}" value="${v.glassMakeup||''}">
        </div>
        <div class="field-group"><label>Existing wall type *</label>
            <input type="text" name="wallType_${id}" value="${v.wallType||''}">
        </div>
        <div class="field-group"><label>Color (interior/exterior) *</label>
            <input type="text" name="color_${id}" value="${v.color||''}">
        </div>
        <div class="field-group"><label>Grid *</label>
            <input type="text" name="grid_${id}" value="${v.grid||''}">
        </div>
        <div class="field-group"><label>Room *</label>
            <input type="text" name="room_${id}" value="${v.room||''}">
        </div>
        <div class="field-group">
            <label>Price</label>
            <div style="padding:10px;background:#e8f5e9;border-radius:4px;font-weight:bold;font-size:18px;">
                <span id="price_${id}">$0.00</span>
            </div>
        </div>
        <div class="field-group"><label>Special notes *</label>
            <textarea name="notes_${id}">${v.notes||''}</textarea>
        </div>
        <div class="field-group"><label>Configuration Exterior View *</label>
            <input type="text" name="configExterior_${id}" value="${v.configExterior||''}">
        </div>
        ${buildSketchPicker('Exterior Windows', id, 1)}
        ${buildSketchPicker('Patio', id, 2)}
        <button type="button" class="duplicate-btn full-width" onclick="duplicateEntry(this)">📄 Duplicate Entry</button>
        <button type="button" class="delete-btn full-width" onclick="deleteEntry(this)">🗑️ Delete Entry</button>
    `;
}

// ─── Build custom entry HTML ──────────────────────────────────────────────────
function buildCustomEntryHTML(id, values = {}) {
    const v = values;
    return `
        <div class="entry-title">Custom Item ${id}<span class="custom-price-badge">CUSTOM</span></div>
        <div class="field-group"><label>Item Name *</label>
            <input type="text" name="customName_${id}" placeholder="e.g. Permit fee, Special hardware..." value="${v.customName||''}">
        </div>
        <div class="field-group">
            <label>Price ($) *</label>
            <input type="number" name="customPrice_${id}" class="custom-price-input"
                   placeholder="0.00" min="0" step="0.01"
                   oninput="updateCustomPrice(${id})" value="${v.customPrice||''}">
        </div>
        <div class="field-group">
            <label>Price</label>
            <div style="padding:10px;background:#e8f5e9;border-radius:4px;font-weight:bold;font-size:18px;">
                <span id="price_${id}">$0.00</span>
            </div>
        </div>
        <div class="field-group"><label>Notes</label>
            <textarea name="customNotes_${id}" placeholder="Optional notes...">${v.customNotes||''}</textarea>
        </div>
        ${buildSketchPicker('Exterior Windows', id, 1)}
        ${buildSketchPicker('Patio', id, 2)}
        <button type="button" class="delete-btn full-width" onclick="deleteEntry(this)">🗑️ Delete Custom Item</button>
    `;
}

// ─── Read all current values out of a standard entry block ───────────────────
function readEntryValues(block) {
    const g = name => { const el = block.querySelector(`[name^="${name}_"]`); return el ? el.value : ''; };
    return {
        qty: g('qty'), width: g('width'), height: g('height'), factor: g('factor'),
        frame: g('frame'), glassType: g('glassType'), glassMakeup: g('glassMakeup'),
        wallType: g('wallType'), color: g('color'), grid: g('grid'),
        room: g('room'), notes: g('notes'), configExterior: g('configExterior'),
    };
}

function readCustomValues(block) {
    const g = name => { const el = block.querySelector(`[name^="${name}_"]`); return el ? el.value : ''; };
    return { customName: g('customName'), customPrice: g('customPrice'), customNotes: g('customNotes') };
}

// ─── Add standard entry ───────────────────────────────────────────────────────
function addEntry() {
    entryCount++;
    const entry = document.createElement("div");
    entry.className         = "entry-block";
    entry.dataset.entryType = "standard";
    entry.innerHTML         = buildEntryHTML(entryCount);
    document.getElementById("entries-container").appendChild(entry);
}

// ─── Add custom entry ─────────────────────────────────────────────────────────
function addCustomEntry() {
    entryCount++;
    const entry = document.createElement("div");
    entry.className         = "custom-entry-block";
    entry.dataset.entryType = "custom";
    entry.innerHTML         = buildCustomEntryHTML(entryCount);
    document.getElementById("entries-container").appendChild(entry);
}

// ─── Delete ───────────────────────────────────────────────────────────────────
function deleteEntry(button) {
    button.parentElement.remove();
    updateTotals();
}

// ─── Duplicate ────────────────────────────────────────────────────────────────
function duplicateEntry(button) {
    const original = button.parentElement;
    const isCustom = original.dataset.entryType === "custom";

    // Capture sketch selections BEFORE building the new block
    const { exteriorFile, patioFile } = readSketchSelections(original);

    entryCount++;
    const id    = entryCount;
    const clone = document.createElement("div");

    if (isCustom) {
        clone.className         = "custom-entry-block";
        clone.dataset.entryType = "custom";
        clone.innerHTML         = buildCustomEntryHTML(id, readCustomValues(original));
        original.after(clone);
        // Restore price display
        const priceVal = parseFloat(clone.querySelector(`input[name='customPrice_${id}']`).value) || 0;
        clone.querySelector(`#price_${id}`).textContent = `$${priceVal.toFixed(2)}`;
    } else {
        clone.className         = "entry-block";
        clone.dataset.entryType = "standard";
        clone.innerHTML         = buildEntryHTML(id, readEntryValues(original));
        original.after(clone);
        calculatePrice(id);
    }

    // Re-apply sketch selections now that the new pickers are in the DOM
    applySketchSelections(id, exteriorFile, patioFile);

    updateTotals();
}

// ─── Submit ───────────────────────────────────────────────────────────────────
document.getElementById("contractForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const requiredTop = document.querySelectorAll(
        "input[name='soldTo'], input[name='phone'], input[name='email'], " +
        "input[name='jobSite'], input[name='serviceType'], input[name='preferredDate']"
    );
    for (let field of requiredTop) {
        if (field.value.trim() === "") { alert("Please fill out all required fields."); field.focus(); return; }
    }

    const formData = {
        soldTo:        document.querySelector("input[name='soldTo']").value,
        phone:         document.querySelector("input[name='phone']").value,
        email:         document.querySelector("input[name='email']").value,
        jobSite:       document.querySelector("input[name='jobSite']").value,
        serviceType:   document.querySelector("input[name='serviceType']").value,
        preferredDate: document.querySelector("input[name='preferredDate']").value,
        entries:       []
    };

    const allBlocks = document.querySelectorAll(".entry-block, .custom-entry-block");
    if (allBlocks.length === 0) { alert("Please add at least one item before submitting."); return; }

    for (let block of allBlocks) {
        const isCustom     = block.dataset.entryType === "custom";
        const priceDisplay = block.querySelector("[id^='price_']").textContent;

        const sketches = [];
        block.querySelectorAll("select[id^='sketch_']").forEach(sel => {
            if (!sel.value) return;
            const pIdx     = sel.id.split('_')[1];
            const category = pIdx === '1' ? 'Exterior Windows' : 'Patio';
            const match    = (sketchManifest[category] || []).find(i => i.file === sel.value);
            if (match) sketches.push({ category, file: match.file, label: match.name, base64: match.base64 });
        });

        if (isCustom) {
            const nameField  = block.querySelector("input[name^='customName_']");
            const priceField = block.querySelector("input[name^='customPrice_']");
            if (!nameField.value.trim()) { alert("Please fill out the item name for all custom items."); nameField.focus(); return; }
            if (!priceField.value.trim() || isNaN(parseFloat(priceField.value))) { alert("Please enter a valid price for all custom items."); priceField.focus(); return; }
            formData.entries.push({
                isCustom: true, customName: nameField.value.trim(),
                qty:"1", width:"-", height:"-", factor:"-", frame:"-", glassType:"-",
                glassMakeup:"-", wallType:"-", color:"-", grid:"-", room:"-",
                price: parseFloat(priceField.value).toFixed(2),
                notes: block.querySelector("textarea[name^='customNotes_']").value || "",
                configExterior: "-", sketches
            });
        } else {
            const entry = {
                isCustom: false,
                qty:            block.querySelector("input[name^='qty_']").value,
                width:          block.querySelector("input[name^='width_']").value,
                height:         block.querySelector("input[name^='height_']").value,
                factor:         block.querySelector("input[name^='factor_']").value,
                frame:          block.querySelector("select[name^='frame_']").value,
                glassType:      block.querySelector("select[name^='glassType_']").value,
                glassMakeup:    block.querySelector("input[name^='glassMakeup_']").value,
                wallType:       block.querySelector("input[name^='wallType_']").value,
                color:          block.querySelector("input[name^='color_']").value,
                grid:           block.querySelector("input[name^='grid_']").value,
                room:           block.querySelector("input[name^='room_']").value,
                price:          priceDisplay.replace('$',''),
                notes:          block.querySelector("textarea[name^='notes_']").value,
                configExterior: block.querySelector("input[name^='configExterior_']").value,
                sketches
            };
            for (let key in entry) {
                if (!['price','isCustom','sketches'].includes(key) && entry[key].trim() === "") {
                    alert("Please fill out all fields in each item entry."); return;
                }
            }
            formData.entries.push(entry);
        }
    }

    formData.subtotal = document.getElementById('subtotalDisplay').textContent.replace('$','');
    formData.tax      = document.getElementById('taxDisplay').textContent.replace('$','');
    formData.total    = document.getElementById('totalDisplay').textContent.replace('$','');

    localStorage.setItem('bearContractData', JSON.stringify(formData));

    const baseUrl = window.location.origin + window.location.pathname.replace('windowform.html','');
    const fd = new FormData();
    fd.append('phone', formData.phone); fd.append('email', formData.email);
    fd.append('pdfLink', baseUrl+'thank-you.html');
    fd.append('soldTo', formData.soldTo); fd.append('jobSite', formData.jobSite);
    fd.append('serviceType', formData.serviceType); fd.append('preferredDate', formData.preferredDate);
    fd.append('subtotal', formData.subtotal); fd.append('tax', formData.tax); fd.append('total', formData.total);
    fd.append('numberOfItems', formData.entries.length);
    fd.append('submittedAt', new Date().toISOString());

    fetch('https://hooks.zapier.com/hooks/catch/5506897/uea33t4/', { method:'POST', body:fd })
        .then(() => { window.location.href = 'thank-you.html'; })
        .catch(() => { window.location.href = 'thank-you.html'; });
});
</script>
</body>
</html>
